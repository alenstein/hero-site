<style>

        .fluid-glowing-border {

            background: rgba(19, 19, 19, 0.4);

        }

        .fluid-glowing-border::before {
            content: "";
            position: absolute;
            inset: -1.5px;
            padding: 1.5px;
            border-radius: inherit;
            background: linear-gradient(90deg, transparent, #EC4899, transparent, #EC4899, transparent);

            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            to { background-position: 200% center; }
        }

        .wave-container {
            position: fixed;
            bottom: -50px;
            left: 0;
            width: 100%;
            height: 400px;
            pointer-events: none;
            z-index: 0;

        .wave {
            position: absolute;

            width: 100%;
            height: 100%;

        .pulse-wave {

        }

        @keyframes pulse {
