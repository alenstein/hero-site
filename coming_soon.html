<style>
        body {

        .fluid-glowing-border {

        .fluid-glowing-border::before {
            content: "";

            mask-composite: exclude;
            animation: scan 4s linear infinite;

</div><script>
    document.getElementById('current-year').textContent = new Date().getFullYear();

    // FAQ Bot Logic
    const chatToggleBtn = document.getElementById('chat-toggle-btn');
    const closeBotBtn = document.getElementById('close-bot-btn');
    const faqBot = document.getElementById('faq-bot');
    const faqContent = document.getElementById('faq-content');
    const faqOptions = document.getElementById('faq-options');
    
    let isBotOpen = false;
    let faqDataLoaded = false;
    
    function toggleBot(event) {
      if(event) event.preventDefault();
      isBotOpen = !isBotOpen;
      if (isBotOpen) {
        faqBot.classList.remove('bot-slide-down');
        faqBot.classList.add('bot-slide-up');
        if (!faqDataLoaded) loadFAQ();
      } else {
        faqBot.classList.remove('bot-slide-up');
        faqBot.classList.add('bot-slide-down');
      }
    }
    
    chatToggleBtn.addEventListener('click', toggleBot);
    closeBotBtn.addEventListener('click', toggleBot);
    
    // Auto-scroll content
    function scrollToBottom() {
      faqContent.scrollTop = faqContent.scrollHeight;
    }
    
    function appendAnswer(question, answer) {
      // Create user message 
      const qDiv = document.createElement('div');
      qDiv.className = 'bg-neon/20 border border-neon/30 rounded-2xl rounded-tr-sm p-3 max-w-[85%] ml-auto text-sm font-body text-white self-end flex';
      qDiv.textContent = question;
      faqContent.appendChild(qDiv);
      
      // Hide options temporarily to show interaction
      faqOptions.style.display = 'none';
      scrollToBottom();
      
      // Simulate reply delay
      setTimeout(() => {
        const aDiv = document.createElement('div');
        aDiv.className = 'bg-white/5 rounded-2xl rounded-tl-sm p-3 inline-block max-w-[85%] border border-white/5 text-sm font-body text-gray-300 leading-relaxed self-start';
        aDiv.textContent = answer;
        faqContent.appendChild(aDiv);
        
        // Show options again at the bottom
        faqOptions.style.display = 'flex';
        faqContent.appendChild(faqOptions);
        scrollToBottom();
      }, 600);
    }
    
    async function loadFAQ() {
      try {
        const response = await fetch('./faq.json');
        const data = await response.json();
        
        data.forEach(item => {
          const btn = document.createElement('button');
          btn.className = 'text-left w-full bg-black/40 hover:bg-neon/20 border border-white/10 hover:border-neon/50 transition-colors rounded-xl p-3 text-xs sm:text-sm text-gray-300 hover:text-white font-medium';
          btn.textContent = item.q;
          btn.onclick = () => appendAnswer(item.q, item.a);
          faqOptions.appendChild(btn);
        });
        
        faqDataLoaded = true;
      } catch (e) {
        console.error('Failed to load FAQs:', e);
      }
    }
  </script></body></html>
